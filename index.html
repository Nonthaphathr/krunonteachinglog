/* ---------- Persist (เขียนลง Firestore) ---------- */
const PersistCtx = createContext(null);
const usePersist = () => useContext(PersistCtx);

function makePersist(){
  if(!FB){ // โหมดหน่วยความจำ: ทุกฟังก์ชันเป็น no-op
    const noop = async()=>{};
    return { addSubject:noop,updateSubject:noop,deleteSubject:noop,replaceStudents:noop,
      deleteStudent:noop,setAttendanceDay:noop,addAssignment:noop,updateAssignment:noop,
      deleteAssignment:noop,setScoreDoc:noop,addNote:noop,updateNote:noop,deleteNote:noop,setLogo:noop };
  }
  const col = (n)=>db.collection(n);
  const deleteWhere = async(name,subjId)=>{
    const snap = await col(name).where("subjectId","==",subjId).get();
    await Promise.all(snap.docs.map(d=>d.ref.delete()));
  };
  return {
    addSubject:(s)=>col("subjects").doc(s.id).set({name:s.name,code:s.code,room:s.room,color:s.color,createdAt:s.createdAt||Date.now()}),
    updateSubject:(id,s)=>col("subjects").doc(id).set({name:s.name,code:s.code,room:s.room,color:s.color},{merge:true}),
    deleteSubject:async(id)=>{ await col("subjects").doc(id).delete();
      await Promise.all(["students","assignments","notes","attendance","scores"].map(n=>deleteWhere(n,id))); },
    replaceStudents:async(subjId,list)=>{ await deleteWhere("students",subjId);
      const batch=db.batch(); list.forEach(s=>batch.set(col("students").doc(s.id),{subjectId:subjId,number:s.number,name:s.name})); await batch.commit(); },
    deleteStudent:(id)=>col("students").doc(id).delete(),
    setAttendanceDay:(subjId,date,marks)=>col("attendance").doc(subjId+"_"+date).set({subjectId:subjId,date,marks}),
    addAssignment:(subjId,a)=>col("assignments").doc(a.id).set({subjectId:subjId,title:a.title,max:a.max,order:a.order}),
    updateAssignment:(id,a)=>col("assignments").doc(id).set({title:a.title,max:a.max},{merge:true}),
    deleteAssignment:(id)=>col("assignments").doc(id).delete(),
    setScoreDoc:(subjId,studentId,values)=>col("scores").doc(subjId+"_"+studentId).set({subjectId:subjId,studentId,values}),
    addNote:(subjId,n)=>col("notes").doc(n.id).set({subjectId:subjId,date:n.date,text:n.text}),
    updateNote:(id,n)=>col("notes").doc(id).set({date:n.date,text:n.text},{merge:true}),
    deleteNote:(id)=>col("notes").doc(id).delete(),
    setLogo:(url)=>col("settings").doc("app").set({logoUrl:url}),
  };
}

/* ---------- UI primitives ---------- */
function Btn({children,onClick,variant="primary",size="md",style,title,disabled}){
  const base={display:"inline-flex",alignItems:"center",justifyContent:"center",gap:6,borderRadius:8,
    cursor:disabled?"not-allowed":"pointer",fontWeight:600,border:"1px solid transparent",fontFamily:"inherit",

    ghost:{background:"transparent",color:C.navy,border:"1px solid "+C.border},

  return <button title={title} disabled={disabled} onClick={onClick} style={{...base,...v[variant],...style}}>{children}</button>;
}

}

/* ==================== APP ==================== */
function App(){
  const [subjects,setSubjects]=useState([]);
  const [students,setStudents]=useState({});
  const [attendance,setAttendance]=useState({});
  const [assignments,setAssignments]=useState({});
  const [scores,setScores]=useState({});
  const [notes,setNotes]=useState({});
  const [logoUrl,setLogoUrl]=useState("");
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState("home");
  const [activeSubj,setActiveSubj]=useState(null);
  const persist = useMemo(()=>makePersist(),[]);

  // โหลดข้อมูลครั้งแรกจาก Firestore
  useEffect(()=>{
    let alive=true;
    async function load(){
      if(!FB){ // seed ตัวอย่างในโหมดหน่วยความจำ
        setSubjects([{id:"s1",name:"วิทยาการคำนวณ",code:"ว21104",room:"ม.1/1",color:CARD_COLORS[0],createdAt:1}]);
        setStudents({s1:[{id:"a1",number:1,name:"เด็กชายกิตติ ใจดี"},{id:"a2",number:2,name:"เด็กหญิงนภา ศรีสุข"}]});
        setLoading(false); return;
      }
      try{
        const [sub,stu,att,asg,sco,note,setDoc]=await Promise.all([
          db.collection("subjects").get(),db.collection("students").get(),
          db.collection("attendance").get(),db.collection("assignments").get(),
          db.collection("scores").get(),db.collection("notes").get(),
          db.collection("settings").doc("app").get(),
        ]);
        if(!alive) return;
        setSubjects(sub.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0)));
        const stuObj={}; stu.docs.forEach(d=>{const x={id:d.id,...d.data()}; (stuObj[x.subjectId]=stuObj[x.subjectId]||[]).push(x);});
        Object.keys(stuObj).forEach(k=>stuObj[k].sort((a,b)=>(a.number||0)-(b.number||0))); setStudents(stuObj);
        const attObj={}; att.docs.forEach(d=>{const x=d.data(); attObj[x.subjectId]=attObj[x.subjectId]||{}; attObj[x.subjectId][x.date]=x.marks||{};}); setAttendance(attObj);
        const asgObj={}; asg.docs.forEach(d=>{const x={id:d.id,...d.data()}; (asgObj[x.subjectId]=asgObj[x.subjectId]||[]).push(x);});
        Object.keys(asgObj).forEach(k=>asgObj[k].sort((a,b)=>(a.order||0)-(b.order||0))); setAssignments(asgObj);
        const scoObj={}; sco.docs.forEach(d=>{const x=d.data(); scoObj[x.subjectId]=scoObj[x.subjectId]||{}; scoObj[x.subjectId][x.studentId]=x.values||{};}); setScores(scoObj);
        const noteObj={}; note.docs.forEach(d=>{const x={id:d.id,...d.data()}; (noteObj[x.subjectId]=noteObj[x.subjectId]||[]).push(x);}); setNotes(noteObj);
        if(setDoc.exists) setLogoUrl(setDoc.data().logoUrl||"");
      }catch(e){ console.error("โหลดข้อมูลล้มเหลว:",e); }
      if(alive) setLoading(false);
    }
    load(); return ()=>{alive=false;};
  },[]);

  useEffect(()=>{ if(!logoUrl) return; const l=document.getElementById("favicon"); if(l) l.href=logoUrl; },[logoUrl]);

  const subj = subjects.find(s=>s.id===activeSubj);
  const openSubject=(id)=>{ setActiveSubj(id); setView("class"); };

  if(loading) return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",color:SUB,gap:14}}>
    <div className="spin" style={{color:C.accent}}><Cloud size={40}/></div><div>กำลังโหลดข้อมูล...</div></div>;

  return <PersistCtx.Provider value={persist}>
  <div style={{minHeight:"100vh",color:C.text}}>
    <header style={{background:C.navy,color:"#fff",position:"sticky",top:0,zIndex:40,borderBottom:"3px solid "+C.accent}}>
      <div style={{maxWidth:920,margin:"0 auto",padding:"11px 16px",display:"flex",alignItems:"center",gap:12}}>
        {view!=="home" && <button onClick={()=>setView(view==="class"?"home":"class")} style={{background:"rgba(255,255,255,.12)",border:"none",color:"#fff",borderRadius:8,padding:7,cursor:"pointer",display:"flex"}}><ChevronLeft size={20}/></button>}
        {logoUrl ? <img src={logoUrl} alt="logo" style={{width:34,height:34,borderRadius:8,objectFit:"cover",background:"#fff"}}/> :
          <div style={{width:34,height:34,borderRadius:8,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center"}}><BookOpen size={19}/></div>}
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:16,lineHeight:1.15}}>บันทึกการสอนครูนนท์</div>
          <div style={{fontSize:12,color:"#b9c6d6"}}>{view==="home"?"รายวิชาที่รับผิดชอบ":subj?subj.name+" · "+subj.room:"ตั้งค่าระบบ"}</div>
        </div>
        <button onClick={()=>setView("settings")} title="ตั้งค่า" style={{background:view==="settings"?C.accent:"rgba(255,255,255,.12)",border:"none",color:"#fff",borderRadius:8,padding:8,cursor:"pointer",display:"flex"}}><Settings size={20}/></button>
      </div>
    </header>
    {!FB && <div style={{background:"#fbf4e0",color:"#8a6d1b",fontSize:13,textAlign:"center",padding:"7px 12px"}}>โหมดทดลอง (ยังไม่ได้ต่อ Firestore) — ข้อมูลจะไม่ถูกบันทึก เมื่อ deploy บน GitHub Pages จะบันทึกอัตโนมัติ</div>}
    <main style={{maxWidth:920,margin:"0 auto",padding:16,paddingBottom:60}}>
      {view==="home" && <HomeView subjects={subjects} setSubjects={setSubjects} openSubject={openSubject} students={students} setStudents={setStudents}/>}
      {view==="class" && subj && <ClassView subj={subj} setView={setView} students={students[subj.id]||[]}/>}
      {view==="attendance" && subj && <AttendanceView subj={subj} students={students[subj.id]||[]} attendance={attendance} setAttendance={setAttendance}/>}
      {view==="scores" && subj && <ScoresView subj={subj} students={students[subj.id]||[]} assignments={assignments} setAssignments={setAssignments} scores={scores} setScores={setScores}/>}
      {view==="notes" && subj && <NotesView subj={subj} notes={notes} setNotes={setNotes}/>}
      {view==="settings" && <SettingsView subjects={subjects} students={students} setStudents={setStudents} logoUrl={logoUrl} setLogoUrl={setLogoUrl}/>}
    </main>
  </div>
  </PersistCtx.Provider>;
}

/* ---------- HOME ---------- */
function HomeView({subjects,setSubjects,openSubject,students,setStudents}){
  const persist=usePersist();
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({name:"",code:"",room:"",color:CARD_COLORS[0]});
  const openAdd=()=>{ setForm({name:"",code:"",room:"",color:CARD_COLORS[subjects.length%CARD_COLORS.length]}); setModal({mode:"add"}); };
  const openEdit=(s)=>{ setForm({...s}); setModal({mode:"edit",id:s.id}); };
  const save=()=>{
    if(!form.name.trim()) return;
    if(modal.mode==="add"){ const id=uid(); const rec={...form,id,createdAt:Date.now()};
      setSubjects([...subjects,rec]); setStudents(p=>({...p,[id]:[]})); persist.addSubject(rec);
    } else { setSubjects(subjects.map(s=>s.id===modal.id?{...s,...form}:s)); persist.updateSubject(modal.id,form); }
    setModal(null);
  };
  const remove=(id)=>{ if(!window.confirm("ลบรายวิชานี้และข้อมูลทั้งหมด?")) return;
    setSubjects(subjects.filter(s=>s.id!==id)); persist.deleteSubject(id); };

            <div style={{fontSize:17,fontWeight:700,color:C.navy,margin:"2px 0 6px"}}>{s.name}</div>
            <div style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:13,color:SUB,background:C.navySoft,padding:"3px 9px",borderRadius:20}}>ห้อง {s.room||"—"} · {(students[s.id]||[]).length} คน</div>
          </div>
        </div>
        <div style={{display:"flex",borderTop:"1px solid "+C.border}}>
          <button onClick={()=>openEdit(s)} style={cardActBtn}><Pencil size={15}/>แก้ไข</button>
          <button onClick={()=>remove(s.id)} style={{...cardActBtn,color:"#c0392b",borderLeft:"1px solid "+C.border}}><Trash2 size={15}/>ลบ</button>
        </div>
      </div>)}
      {subjects.length===0 && <EmptyHint text="ยังไม่มีรายวิชา กดปุ่ม “เพิ่มวิชา”"/>}
    </div>
    <Modal open={!!modal} onClose={()=>setModal(null)} title={modal&&modal.mode==="add"?"เพิ่มรายวิชา":"แก้ไขรายวิชา"}>

      <Field label="ห้องเรียน"><input style={inputStyle} value={form.room} onChange={e=>setForm({...form,room:e.target.value})} placeholder="เช่น ม.1/1"/></Field>
      <Field label="สีประจำวิชา"><div style={{display:"flex",gap:8}}>
        {CARD_COLORS.map(c=><button key={c} onClick={()=>setForm({...form,color:c})} style={{width:30,height:30,borderRadius:8,background:c,cursor:"pointer",border:form.color===c?"3px solid "+C.navy:"2px solid #fff",outline:form.color===c?"1px solid "+C.navy:"none"}}/>)}

}

/* ---------- ATTENDANCE ---------- */
function AttendanceView({subj,students,attendance,setAttendance}){
  const persist=usePersist();
  const [date,setDate]=useState(todayStr());
  const dayData = (attendance[subj.id]&&attendance[subj.id][date])||{};
  const setStatus=(studentId,status)=>{
    const cur=(attendance[subj.id]&&attendance[subj.id][date])||{};
    const day={...cur};
    if(day[studentId]===status) delete day[studentId]; else day[studentId]=status;
    setAttendance(p=>({...p,[subj.id]:{...(p[subj.id]||{}),[date]:day}}));
    persist.setAttendanceDay(subj.id,date,day);
  };
  const markAll=(status)=>{ const day={}; students.forEach(s=>day[s.id]=status);
    setAttendance(p=>({...p,[subj.id]:{...(p[subj.id]||{}),[date]:day}})); persist.setAttendanceDay(subj.id,date,day); };
  const counts=useMemo(()=>{ const c={present:0,absent:0,personal:0,sick:0,skip:0};
    Object.values(dayData).forEach(v=>{ if(c[v]!=null) c[v]++; }); return c; },[dayData]);
  const exportXlsx=()=>{
    const subjA=attendance[subj.id]||{}; const dates=Object.keys(subjA).sort();
    const header=["เลขที่","ชื่อ-สกุล",...dates.map(fmtDate)];
    const rows=students.map(s=>[s.number,s.name,...dates.map(d=>(subjA[d]&&subjA[d][s.id])?STATUS[subjA[d][s.id]].label:"")]);
    const ws=XLSX.utils.aoa_to_sheet([header,...rows]);
    ws["!cols"]=[{wch:7},{wch:26},...dates.map(()=>({wch:10}))];
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"เช็คชื่อ");
    XLSX.writeFile(wb,"เช็คชื่อ_"+subj.name+"_"+subj.room+".xlsx");
  };
  return <div>
    <SectionHead title="เช็คชื่อ" right={<Btn variant="accent" size="sm" onClick={exportXlsx}><Download size={15}/>Export .xlsx</Btn>}/>
    <div style={{background:"#fff",border:"1px solid "+C.border,borderRadius:12,padding:14,marginBottom:12}}>
      <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:13,fontWeight:600,color:SUB}}>วันที่</span>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...inputStyle,width:"auto",padding:"8px 10px"}}/>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:12}}>
        {STATUS_ORDER.map(k=><span key={k} style={{fontSize:12.5,padding:"3px 9px",borderRadius:20,background:STATUS[k].bg,color:STATUS[k].color,fontWeight:600}}>{STATUS[k].label} {counts[k]}</span>)}
        <button onClick={()=>markAll("present")} style={{marginLeft:"auto",fontSize:12.5,color:C.navy,background:C.navySoft,border:"none",borderRadius:20,padding:"4px 11px",cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}>เลือก “มา” ทั้งหมด</button>
      </div>
    </div>
    <div style={tableWrap}><table style={tableStyle}>
      <thead><tr><th style={{...th,width:44}}>#</th><th style={{...th,textAlign:"left"}}>ชื่อ-สกุล</th><th style={{...th,minWidth:230}}>สถานะ</th></tr></thead>
      <tbody>
        {students.map(s=><tr key={s.id} className="tl-row">
          <td style={{...td,textAlign:"center",color:SUB}}>{s.number}</td>
          <td style={td}>{s.name}</td>
          <td style={td}><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {STATUS_ORDER.map(k=>{ const on=dayData[s.id]===k;
              return <button key={k} onClick={()=>setStatus(s.id,k)} style={{fontSize:12.5,padding:"5px 9px",borderRadius:8,cursor:"pointer",fontWeight:600,fontFamily:"inherit",border:on?"1px solid "+STATUS[k].color:"1px solid "+C.border,background:on?STATUS[k].color:"#fff",color:on?"#fff":SUB}}>{STATUS[k].short}</button>;
            })}
          </div></td>
        </tr>)}
        {students.length===0 && <tr><td colSpan={3} style={{...td,textAlign:"center",color:SUB,padding:28}}>ยังไม่มีรายชื่อนักเรียน — เพิ่มได้ที่เมนู “ตั้งค่า”</td></tr>}
      </tbody>
    </table></div>
  </div>;
}

  const [aForm,setAForm]=useState({title:"",max:10});

    const item={id:uid(),title:aForm.title.trim(),max:Number(aForm.max)||0,order:Date.now()};
    setAssignments(p=>({...p,[subj.id]:[...(p[subj.id]||[]),item]})); persist.addAssignment(subj.id,item);
    setModal(null); setAForm({title:"",max:10}); };
  const editAssignment=()=>{ const upd={title:aForm.title.trim(),max:Number(aForm.max)||0};

  const setScore=(studentId,aId,val)=>{
    const row={...(subjScores[studentId]||{})}; if(val==="") delete row[aId]; else row[aId]=val;
    setScores(p=>({...p,[subj.id]:{...(p[subj.id]||{}),[studentId]:row}})); persist.setScoreDoc(subj.id,studentId,row);
  };
  const rowTotal=(studentId)=>list.reduce((sum,a)=>sum+(Number(subjScores[studentId]&&subjScores[studentId][a.id])||0),0);

      <Btn variant="accent" size="sm" onClick={exportXlsx}><Download size={15}/>Export</Btn>
    </div>}/>
    <div style={tableWrap}><table style={tableStyle}>
      <thead><tr>
        <th style={{...th,width:40}}>#</th>
        <th style={{...th,textAlign:"left",minWidth:150,position:"sticky",left:0,background:C.navy,zIndex:2}}>ชื่อ-สกุล</th>
        {list.map(a=><th key={a.id} style={{...th,minWidth:96}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <span style={{lineHeight:1.2}}>{a.title}</span>
            <span style={{fontWeight:400,fontSize:11,color:"#c7d4e2"}}>เต็ม {a.max}</span>
            <div style={{display:"flex",gap:4}}>
              <button onClick={()=>{setAForm({title:a.title,max:a.max});setModal({mode:"edit",id:a.id});}} style={miniIcon}><Pencil size={12}/></button>
              <button onClick={()=>removeAssignment(a.id)} style={{...miniIcon,color:"#ffd0c8"}}><Trash2 size={12}/></button>

      <tbody>
        {students.map(s=><tr key={s.id} className="tl-row">
          <td style={{...td,textAlign:"center",color:SUB}}>{s.number}</td>
          <td style={{...td,position:"sticky",left:0,background:"inherit",fontWeight:500}}>{s.name}</td>
          {list.map(a=><td key={a.id} style={{...td,padding:4}}>
            <input type="number" value={(subjScores[s.id]&&subjScores[s.id][a.id])!=null?subjScores[s.id][a.id]:""} onChange={e=>setScore(s.id,a.id,e.target.value)}
              style={{width:64,textAlign:"center",padding:"6px 4px",border:"1px solid "+C.border,borderRadius:6,fontFamily:"inherit",fontSize:14,outline:"none"}}/>

    <Modal open={!!modal} onClose={()=>setModal(null)} title={modal&&modal.mode==="add"?"เพิ่มหัวข้องาน":"แก้ไขหัวข้องาน"}>

      <Field label="คะแนนเต็ม"><input type="number" style={inputStyle} value={aForm.max} onChange={e=>setAForm({...aForm,max:e.target.value})}/></Field>
      <Btn variant="primary" onClick={modal&&modal.mode==="add"?addAssignment:editAssignment} style={{width:"100%"}}><Save size={16}/>บันทึก</Btn>
    </Modal>
  </div>;
}

/* ---------- SETTINGS ---------- */
function SettingsView({subjects,students,setStudents,logoUrl,setLogoUrl}){
  const persist=usePersist();
  const [target,setTarget]=useState((subjects[0]&&subjects[0].id)||"");
  const [pasteText,setPasteText]=useState("");
  const [logoInput,setLogoInput]=useState(logoUrl);
  const fileRef=useRef();
  useEffect(()=>{ if(!target && subjects[0]) setTarget(subjects[0].id); },[subjects]);
  const parseNames=(text)=>text.split("\n").map(l=>l.trim()).filter(Boolean).map((line,i)=>{
    const m=line.split(/[,\t]/).map(x=>x.trim());
    if(m.length>=2 && /^\d+$/.test(m[0])) return {id:uid(),number:Number(m[0]),name:m.slice(1).join(" ")};
    return {id:uid(),number:i+1,name:line};
  });
  const importPaste=()=>{ if(!target) return alert("ยังไม่มีรายวิชา");
    const parsed=parseNames(pasteText); if(!parsed.length) return;
    setStudents(p=>({...p,[target]:parsed})); persist.replaceStudents(target,parsed); setPasteText(""); alert("นำเข้า "+parsed.length+" รายชื่อสำเร็จ"); };
  const importFile=(e)=>{ const file=e.target.files[0]; if(!file||!target) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{ const wb=XLSX.read(new Uint8Array(ev.target.result),{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]]; const rows=XLSX.utils.sheet_to_json(ws,{header:1}); const parsed=[];
      rows.forEach((r,i)=>{ if(!r||!r.length) return; const first=String(r[0]!=null?r[0]:"").trim();
        if(i===0 && !/^\d+$/.test(first)) return;
        if(/^\d+$/.test(first) && r[1]) parsed.push({id:uid(),number:Number(first),name:String(r[1]).trim()});
        else if(first) parsed.push({id:uid(),number:parsed.length+1,name:first}); });
      if(parsed.length){ setStudents(p=>({...p,[target]:parsed})); persist.replaceStudents(target,parsed); alert("นำเข้าจากไฟล์ "+parsed.length+" รายชื่อสำเร็จ"); }
      else alert("ไม่พบข้อมูลในไฟล์"); };
    reader.readAsArrayBuffer(file); e.target.value=""; };
  const currentList=students[target]||[];
  const removeStudent=(id)=>{ setStudents(p=>({...p,[target]:(p[target]||[]).filter(s=>s.id!==id)})); persist.deleteStudent(id); };
  return <div style={{display:"grid",gap:14}}>
    <h2 style={{margin:0,fontSize:19,color:C.navy}}>ตั้งค่าระบบ</h2>
    <div style={panel}>
      <div style={panelHead}><Upload size={18}/> นำเข้ารายชื่อนักเรียน</div>
      <Field label="เลือกรายวิชา"><select style={inputStyle} value={target} onChange={e=>setTarget(e.target.value)}>
        {subjects.map(s=><option key={s.id} value={s.id}>{s.name} ({s.room})</option>)}
      </select></Field>
      <Field label="วางรายชื่อ (1 บรรทัด/คน — รองรับ “เลขที่,ชื่อ” หรือชื่ออย่างเดียว)">
        <textarea style={{...inputStyle,minHeight:110,resize:"vertical"}} value={pasteText} onChange={e=>setPasteText(e.target.value)} placeholder={"1,เด็กชายสมชาย ใจดี\n2,เด็กหญิงสมหญิง รักเรียน"}/>
      </Field>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        <Btn variant="primary" onClick={importPaste}><Upload size={15}/>นำเข้าจากข้อความ</Btn>
        <Btn variant="ghost" onClick={()=>fileRef.current&&fileRef.current.click()}><Upload size={15}/>นำเข้าจากไฟล์ .xlsx / .csv</Btn>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={importFile} style={{display:"none"}}/>
      </div>
      {currentList.length>0 && <div style={{marginTop:14}}>
        <div style={{fontSize:13,fontWeight:600,color:SUB,marginBottom:6}}>รายชื่อปัจจุบัน ({currentList.length} คน)</div>
        <div style={{...tableWrap,maxHeight:240}}><table style={tableStyle}>
          <thead><tr><th style={{...th,width:44}}>#</th><th style={{...th,textAlign:"left"}}>ชื่อ-สกุล</th><th style={{...th,width:56}}></th></tr></thead>
          <tbody>{currentList.map(s=><tr key={s.id} className="tl-row">
            <td style={{...td,textAlign:"center",color:SUB}}>{s.number}</td><td style={td}>{s.name}</td>
            <td style={{...td,textAlign:"center"}}><button onClick={()=>removeStudent(s.id)} style={{background:"none",border:"none",color:"#c0392b",cursor:"pointer"}}><Trash2 size={15}/></button></td>
          </tr>)}</tbody>
        </table></div>
      </div>}
    </div>
    <div style={panel}>
      <div style={panelHead}><ImageIcon size={18}/> โลโก้ระบบ (ใช้เป็น favicon ด้วย)</div>
      <Field label="ลิงก์รูปโลโก้ (URL)"><input style={inputStyle} value={logoInput} onChange={e=>setLogoInput(e.target.value)} placeholder="https://.../logo.png"/></Field>
      <div style={{display:"flex",gap:12,alignItems:"center"}}>
        <Btn variant="primary" onClick={()=>{ const u=logoInput.trim(); setLogoUrl(u); persist.setLogo(u); }}><Save size={15}/>บันทึกโลโก้</Btn>
        {logoInput && <img src={logoInput} alt="preview" style={{width:44,height:44,borderRadius:8,objectFit:"cover",border:"1px solid "+C.border}}/>}
      </div>
    </div>
    <div style={{...panel,fontSize:13,color:SUB,lineHeight:1.6}}>
      <div style={panelHead}><Cloud size={18}/> สถานะฐานข้อมูล</div>
      {FB ? "เชื่อมต่อ Firestore แล้ว — ข้อมูลถูกบันทึกอัตโนมัติ" : "ยังไม่ได้เชื่อมต่อ Firestore (กำลังรันในโหมดทดลอง) เมื่อเปิดผ่าน GitHub Pages ระบบจะเชื่อมต่ออัตโนมัติ"}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
